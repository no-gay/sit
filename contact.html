<!doctype html>
<html class="no-js" lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контакты - AutoElite</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Шапка сайта -->
  <header>
    <div class="container">
      <h1><img src="icon.svg" alt="AutoElite Logo" class="logo">AutoElite</h1>
      <nav>
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="index.html#cars">Автомобили</a></li>
          <li><a href="contact.html">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top: 100px; padding-bottom: 50px;">
    <!-- Форма контактов -->
    <section id="contact" class="contact">
      <div class="container">
        <h2>Свяжитесь с Нами</h2>
        <form>
          <label for="name">Имя:</label>
          <input type="text" id="name" name="name" required>
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
          <label for="message">Сообщение:</label>
          <textarea id="message" name="message" required></textarea>
          <button type="submit">Отправить</button>
        </form>
      </div>
    </section>

    <!-- Раздел создатели -->
    <section class="creators" style="margin-top: 40px; text-align: center;">
      <div class="container">
        <h2>Создатели</h2>
        <p>Клименко Глеб, Рязанов Никита, Румянцев Тимур</p>
        <p style="margin-top: 10px; font-weight: bold;">ИСП-10-23</p>
      </div>
    </section>
  </main>

  <!-- Подвал -->
  <footer>
    <div class="container">
      <p>&copy; 2026 AutoElite. Все права защищены.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>

</body>

</html>
